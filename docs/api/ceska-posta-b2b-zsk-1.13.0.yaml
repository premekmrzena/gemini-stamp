            - vycistena - cleared,
            - nevycistena - uncleared.
            / Flag chyby MDM. Definuje, zda adresa byla vyčištěna nebo ne. Nabývá hodnot:
            - vycistena,
            - nevycistena
          example: 'nevycistena'
        clearedCAD:
          type: string
          description: >
            Determines the quality of the address data from the perspective of the CAD system. Values:
              - CAD_bez_zmeny - CAD without changes,
              - CAD_zmena - CAD with changes,
              - Data_podani_bez_zmeny - Submit datas without changes,
              - Data_podani_zmena - Submit datas with changes,
              - Neurceno - undetermined.
            / Určuje kvalitu adresních dat z pohledu systému CAD. Nabývá hodnot:
              - CAD_bez_zmeny,
              - CAD_zmena,
              - Data_podani_bez_zmeny,
              - Data_podani_zmena,
              - Neurceno.
          example: 'CAD_bez_zmeny'
        adrMatchMdm:
          type: string
          description: >
            Determines the quality of the address data from the perspective of the MDM system. Values:
            - NOMATCH – ID_DDM was at the entrance,
            - MATCH0 – the most accurate address,
            - MATCH1 – less exact address,
            - MATCH3 - etc..,
            - NOT_FOUND – address not found)
            / Určuje kvalitu adresních dat z pohledu MDM a
            aplikaci pravidla dohledání adresy. Nabývá hodnot:
            - NOMATCH – bylo ID DDM na vstupu,
            - MATCH0 – nejpřesnější adresa,
            - MATCH1 – méně přesná,
            - MATCH3 atd..,
            - NOT_FOUND – adresa nenalezena)
        replacementCode:
          type: string
          description: Replacement code. / Náhradní kód.
        addressLocation:
          $ref: '#/components/schemas/AddressLocation'
        emailAddressee:
          type: string
          description: Email address of addressee. / Email adresáta.
          example: 'jan.novak1@cpost.cz'

    AddressLocation:
      type: object
      properties:
        street:
          type: string
          description: Name of the street. / Název ulice.
        houseNumber:
          type: string
          maxLength: 6
          description: Descriptive (house) number. / Číslo popisné.
          example: '16'
        sequenceNumber:
          type: string
          maxLength: 6
          description: Orientation (sequence) number. / Číslo orientační.
          example: '82'
        cityPart:
          type: string
          maxLength: 40
          description: Part of the city. / Část obce.
          example: 'Strašnice'
        city:
          type: string
          maxLength: 40
          description: City. / Obec.
          example: 'Praha'
        zipCode:
          type: string
          maxLength: 25
          description: Postal code. / PSČ.
          example: '10000'

    ImporterRefNum:
      type: string
      description: Importer number. / Číslo dovozce.

    DeclarationID:
      type: string
      minLength: 13
      maxLength: 13
      description: Declaration ID (necessary for consignment to the USA and Puerto Rico) / Číslo deklarace (nezbytné pro zásilky do USA a Portorika).
      example: "abc4567890123"

    Error:
      type: object
      additionalProperties: false
      properties:
        x-request-id:
          description: Identity uniquelly user transaction
          type: string
          example: ID-f81003313285-1592979767076-41-10
        code:
          type: integer
          description: error code
          example: -50
        status:
          type: string
          description: error description
          example: '500'
        message:
          type: string
          description: error message
          example: Internal error
        moreInfo:
          type: string
          description: more info
          example: Here is better detail of error. It could be some point to documentation or stacktrace and so on.
        date:
          type: string
          example: '2022-02-16T10:48:11+01:00'
      required:
        - message