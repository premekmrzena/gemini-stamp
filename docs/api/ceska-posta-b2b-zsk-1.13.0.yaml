  /report/parcelStatusesB2B/period:
    post:
      description: Get of the status and informations of the consignments given by B2B - search by given period. / Předá stav a informace o zásilkách předaných přes B2B - vyhledání dle daného období.
      summary: Get consignments info by period
      tags:
        - reports
      operationId: getParcelStatusesB2BPeriod
      security:
        - Api-Token: [ ]
          HMAC_SHA256_Auth: [ ]
          Authorization-Timestamp: [ ]
      parameters:
        - name: Date
          in: query
          required: true
          description: Date. / Datum.
          schema:
            type: string
            format: date
            example: '2023-01-10'
        - name: TimeFrom
          in: query
          required: false
          description: Time FROM. / Čas DO.
          schema:
            $ref: '#/components/schemas/TimeURLFrom'
        - name: TimeTo
          in: query
          required: false
          description: Time TO. / Čas DO.
          schema:
